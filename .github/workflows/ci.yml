name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install arm-none-eabi toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi
      - name: Cache firmware download
        uses: actions/cache@v4
        with:
          path: ~/.cache/tt-emu
          key: tt-emu-firmware-8e37af0a3d3c126189447964784fd84ccf0356cb7425b5ab478e86b3352741f9
      - run: pip install -e ".[dev]"
      - name: Type-check the package
        run: mypy tt_emu
      - name: Run the test suite
        run: pytest -q
        env:
          TT_EMU_DOWNLOAD_FIRMWARE: "1"
